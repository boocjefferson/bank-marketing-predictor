<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Term Deposit Predictor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; padding-top: 50px; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #2c3e50; border: none; }
        .btn-primary:hover { background-color: #34495e; }
        .result { font-size: 1.2rem; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h2 class="text-center mb-4"> Bank Marketing Predictor</h2>
                    <p class="text-muted text-center">Enter client details to predict term deposit subscription.</p>
                    
                    <form method="POST">
                        <div class="row g-3">
                            <!-- Demographic Info -->
                            <div class="col-md-4">
                                <label class="form-label">Age</label>
                                <input type="number" name="age" class="form-control" required placeholder="e.g. 65">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Job</label>
                        <select name="job" class="form-select">
                            <option value="admin.">Admin</option>
                            <option value="blue-collar">Blue-collar</option>
                            <option value="entrepreneur">Entrepreneur</option>
                            <option value="housemaid">Housemaid</option>
                            <option value="management">Management</option>
                            <option value="retired">Retired</option>
                            <option value="self-employed">Self-employed</option>
                            <option value="services">Services</option>
                            <option value="student">Student</option>
                            <option value="technician">Technician</option>
                            <option value="unemployed">Unemployed</option>
                            <option value="unknown">Unknown</option>
                            </select>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Marital Status</label>
                                <select name="marital" class="form-select">
                                    <option value="married">Married</option>
                                    <option value="single">Single</option>
                                    <option value="divorced">Divorced</option>
                                </select>
                            </div>

                            <!-- Financial Info -->
                            <div class="col-md-6">
                                <label class="form-label">Account Balance</label>
                                <input type="number" name="balance" class="form-control" required placeholder="e.g. 10000">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Education</label>
                                <select name="education" class="form-select">
                                    <option value="primary">Primary</option>
                                    <option value="secondary">Secondary</option>
                                    <option value="tertiary">Tertiary</option>
                                </select>
                            </div>

                            <!-- Flags -->
                            <div class="col-md-4">
                                <label class="form-label">Credit Default?</label>
                                <select name="default" class="form-select">
                                    <option value="no">No</option>
                                    <option value="yes">Yes</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Housing Loan?</label>
                                <select name="housing" class="form-select">
                                    <option value="no">No</option>
                                    <option value="yes">Yes</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Personal Loan?</label>
                                <select name="loan" class="form-select">
                                    <option value="no">No</option>
                                    <option value="yes">Yes</option>
                                </select>
                            </div>

                            <!-- Campaign Details -->
                            <div class="col-md-6">
                                <label class="form-label">Call Duration (seconds)</label>
                                <input type="number" name="duration" class="form-control" required placeholder="e.g. 950">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Contact Type</label>
                                <select name="contact" class="form-select">
                                    <option value="cellular">Cellular</option>
                                    <option value="telephone">Telephone</option>
                                    <option value="unknown">Unknown</option>
                                </select>
                            </div>

                            <!-- Date/Previous Campaign -->
                            <div class="col-md-4">
                                <<label class="form-label">Month</label>
                                <select name="month" class="form-select">
                                    <option value="jan">January</option>
                                    <option value="feb">February</option>
                                    <option value="mar">March</option>
                                    <option value="apr">April</option>
                                    <option value="may">May</option>
                                    <option value="jun">June</option>
                                    <option value="jul">July</option>
                                    <option value="aug">August</option>
                                    <option value="sep">September</option>
                                    <option value="oct">October</option>
                                    <option value="nov">November</option>
                                    <option value="dec">December</option>
                                </select>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Day of Month</label>
                                <input type="number" name="day" class="form-control" value="15">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Campaign Count</label>
                                <input type="number" name="campaign" class="form-control" value="1">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Days Since Last Contact</label>
                                <input type="number" name="pdays" class="form-control" value="-1">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Previous Contacts</label>
                                <input type="number" name="previous" class="form-control" value="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Prev Outcome</label>
                                <select name="poutcome" class="form-select">
                                    <option value="unknown">Unknown</option>
                                    <option value="success">Success</option>
                                    <option value="failure">Failure</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">Predict Result</button>
                        </div>
                    </form>

                    <div class="result text-center">
                        {{ prediction_text }}
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
